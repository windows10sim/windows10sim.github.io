<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>NoScript Examples</title>
  </head>
  <body>
    <h1>Welcome</h1>
    <div class="nojs-error" id="no-js" style="display: block; text-align: center;">
      <h3>Javascript is disabled, please enable javascript</h3>
    </div>
    <script>
      document.getElementById('no-js').style.display = 'none';
    </script>
  </body>
</html>
